name: Windows FRP Proxy

on:
  workflow_dispatch:


jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Set runner password
      shell: bash
      run: |
        whoami
        # 先尝试修改密码，如果密码不符合策略则启用内置管理员
        net user runneradmin ${{ secrets.WINRCK }} || net user administrator ${{ secrets.WINRCK }}
        net user

    - name: Download and extract frp
      shell: bash
      run: |
        curl -L -o frp.zip https://github.com/fatedier/frp/releases/download/v0.69.0/frp_0.69.0_windows_amd64.zip
        unzip -q frp.zip
        # 获取实际解压出来的文件夹名
        FRP_DIR=$(ls -d frp_* | head -1)
        mv "$FRP_DIR" frp
        ls -la frp/

    - name: Write frpc config
      shell: bash
      run: |
        cat > frp/frpc.toml <<'EOF'
        serverAddr = "47.109.40.213"
        serverPort = 7000
        auth.token = "${{ secrets.RCK }}"

        [[proxies]]
        name = "github_action_win_3389"
        type = "tcp"
        localIP = "127.0.0.1"
        localPort = 3389
        remotePort = 2232
        EOF

    - name: 安装中文语言包并设置为显示语言
      shell: powershell
      run: |
        Write-Host "正在安装中文语言包..." -ForegroundColor Yellow

        # 获取当前语言列表
        $langList = Get-WinUserLanguageList

        # 检查中文是否已存在
        $chineseExists = $false
        foreach ($lang in $langList) {
            if ($lang.LanguageTag -eq "zh-CN") {
                $chineseExists = $true
                break
            }
        }

        # 如果中文不存在，则添加
        if (-not $chineseExists) {
            $langList.Add("zh-CN")
            Set-WinUserLanguageList $langList -Force
            Write-Host "✓ 中文语言包已添加" -ForegroundColor Green
        } else {
            Write-Host "✓ 中文语言包已存在" -ForegroundColor Green
        }

        # 设置系统区域为中文
        Set-WinSystemLocale -SystemLocale "zh-CN"
        Write-Host "✓ 系统区域已设置为中文" -ForegroundColor Green

        # 设置显示语言为中文
        Set-WinUILanguageOverride -Language "zh-CN"
        Write-Host "✓ 显示语言已设置为中文" -ForegroundColor Green

        Write-Host "========================================" -ForegroundColor Yellow
        Write-Host "中文语言包安装完成！需要注销才能完全生效" -ForegroundColor Green
        Write-Host "当前语言设置:" -ForegroundColor Cyan
        Get-WinUserLanguageList
        Write-Host "========================================" -ForegroundColor Yellow

    - name: 开启远程桌面
      shell: powershell
      run: |
        Write-Host "正在开启远程桌面..." -ForegroundColor Yellow

        # 开启远程桌面
        Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0

        # 允许防火墙（兼容中英文系统）
        Enable-NetFirewallRule -DisplayGroup "远程桌面" -ErrorAction SilentlyContinue
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop" -ErrorAction SilentlyContinue

        # 查看远程桌面状态
        $rdpStatus = Get-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections"

        if ($rdpStatus.fDenyTSConnections -eq 0) {
            Write-Host "✓ 远程桌面已成功开启" -ForegroundColor Green
        } else {
            Write-Host "✗ 远程桌面开启失败" -ForegroundColor Red
        }

    - name: Run frpc
      shell: bash
      run: |
        cd frp
        chmod +x frpc.exe
        # 使用 timeout 或直接运行（GitHub Actions 会在 job 结束时自动终止）
        ./frpc.exe -c frpc.toml 2>&1 | tee frpc.log
      timeout-minutes: 3540 # 约 59 小时，最大限制
